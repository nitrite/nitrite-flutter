name: nitrite_support
description: Support library for Nitrite database to provide some additional features like encryption, import/export database etc.
version: 2.0.2
homepage: https://nitrite.dizitart.com/
repository: https://github.com/nitrite/nitrite-flutter

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  path: ^1.8.0
  nitrite: ^2.0.2
  compute: ^1.0.2
  convert: ^3.1.1
  encrypt: ^5.0.1

dev_dependencies:
  flutter:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.24.6
  faker: ^2.0.0
  nitrite_hive_adapter: ^2.0.1
  nitrite_generator: ^2.0.1
  collection: ^1.16.0
  build_runner: ^2.3.3

funding:
  - https://github.com/sponsors/anidotnet
resolution: workspace
